# Katib release automation aligned with kubeflow/sdk.
# Ref: https://github.com/kubeflow/katib/issues/2049
name: Release

on:
  push:
    branches:
      - master
      - "release-*"
    paths:
      - "sdk/python/v1beta1/setup.py"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (validate and build; do not push, tag, or publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.ref) || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release branch
    if: github.repository == 'kubeflow/katib' && !(github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-') && github.actor == 'github-actions[bot]')
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      branch: ${{ steps.vars.outputs.branch }}
      is-prerelease: ${{ steps.vars.outputs.is-prerelease }}
      dry-run: ${{ steps.vars.outputs.dry-run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check version and branch
        id: vars
        shell: bash
        run: |
          VERSION=$(grep -E 'version="[^"]+"' sdk/python/v1beta1/setup.py | head -1 | sed -E 's/.*version="([^"]+)".*/\1/')
          MAJOR_MINOR=$(echo "$VERSION" | sed -E 's/(rc[0-9]+)$//' | cut -d. -f1,2)
          BRANCH="release-${MAJOR_MINOR}"

          if [[ "$VERSION" =~ rc[0-9]+$ ]]; then
            TAG="v${VERSION/rc/-rc.}"
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            TAG="v${VERSION}"
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry-run=true" >> $GITHUB_OUTPUT
          else
            echo "dry-run=false" >> $GITHUB_OUTPUT
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Ensure release branch exists and contains version bump
        if: steps.vars.outputs.dry-run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ steps.vars.outputs.branch }}"
          MASTER_SHA="${{ github.sha }}"

          if [[ "${GITHUB_REF_NAME}" == "$BRANCH" ]]; then
            echo "Triggered on $BRANCH. Skipping cherry-pick from master."
            exit 0
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Using existing branch: $BRANCH"
            git fetch origin "$BRANCH":"$BRANCH"
            git checkout "$BRANCH"
            if git merge-base --is-ancestor "$MASTER_SHA" "$BRANCH"; then
              echo "Commit $MASTER_SHA already present in $BRANCH. Skipping cherry-pick."
            else
              if ! git cherry-pick -x "$MASTER_SHA"; then
                echo "Cherry-pick failed. Please resolve manually on $BRANCH." >&2
                exit 1
              fi
            fi
          else
            echo "Creating new branch: $BRANCH from master@$MASTER_SHA"
            git checkout -B "$BRANCH" "$MASTER_SHA"
          fi
          git push origin "$BRANCH"

      - name: Pin manifest image tags on release branch
        if: steps.vars.outputs.dry-run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          bash scripts/v1beta1/update-images.sh ghcr.io/kubeflow/katib/ ghcr.io/kubeflow/katib/ "$TAG"

      - name: Commit and push manifest pins
        if: steps.vars.outputs.dry-run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          BRANCH="${{ steps.vars.outputs.branch }}"
          if git diff --quiet; then
            echo "Manifest tags already pinned to ${TAG}."
          else
            git add manifests/
            git commit -s -m "Pin manifest image tags to ${TAG}"
            git push origin "$BRANCH"
          fi

      - name: Plan release branch update (dry run)
        if: steps.vars.outputs.dry-run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ steps.vars.outputs.branch }}"
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${{ steps.vars.outputs.version }}"

          if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG"; then
            echo "ERROR: Tag $TAG already exists on remote." >&2
            exit 1
          fi

          echo "Dry run: no branches, tags, images, or packages will be published."
          echo "Version: ${VERSION}"
          echo "Tag: ${TAG}"
          echo "Release branch: ${BRANCH}"
          echo "Trigger ref: ${GITHUB_REF_NAME}@${GITHUB_SHA}"

          if [[ "${GITHUB_REF_NAME}" == "$BRANCH" ]]; then
            echo "Branch action: use current ${BRANCH} commit (no cherry-pick from master)."
          elif git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch action: cherry-pick ${GITHUB_SHA} onto existing ${BRANCH}."
          else
            echo "Branch action: create ${BRANCH} from ${GITHUB_SHA}."
          fi

          echo "Post-build actions skipped in dry run:"
          echo "  - pin manifest image tags on ${BRANCH} and push"
          echo "  - push tag ${TAG}"
          echo "  - publish 22 multi-arch container images"
          echo "  - publish kubeflow-katib and kubeflow_katib_api to PyPI"
          echo "  - create GitHub Release"

  build:
    name: Build packages
    needs: [prepare]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && github.ref || needs.prepare.outputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Verify version consistency
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          SDK_VERSION=$(grep -E 'version="[^"]+"' sdk/python/v1beta1/setup.py | head -1 | sed -E 's/.*version="([^"]+)".*/\1/')
          API_VERSION=$(grep 'API_VERSION=' hack/python-api/gen-api.sh | head -1 | sed -E 's/.*API_VERSION="([^"]+)".*/\1/')
          MODELS_VERSION=$(grep '__version__' api/python_api/kubeflow_katib_api/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')

          echo "Expected version: ${VERSION}"
          echo "SDK: ${SDK_VERSION}, API: ${API_VERSION}, Models: ${MODELS_VERSION}"

          if [[ "${SDK_VERSION}" != "${VERSION}" || "${API_VERSION}" != "${VERSION}" || "${MODELS_VERSION}" != "${VERSION}" ]]; then
            echo "Version mismatch across release artifacts"
            exit 1
          fi

      - name: Verify manifest image tags
        if: needs.prepare.outputs.dry-run != 'true'
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          MANIFEST_TAGS=$(grep -r 'newTag:' manifests/v1beta1/installs | sed 's/.*newTag:[[:space:]]*//' | sort | uniq)
          for t in ${MANIFEST_TAGS}; do
            if [[ "${t}" != "${TAG}" ]]; then
              echo "Manifest tag ${t} does not match release tag ${TAG}"
              exit 1
            fi
          done

      - name: Verify changelog entry
        if: needs.prepare.outputs.is-prerelease != 'true'
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          if ! grep -q "^# \\[${TAG}\\]" CHANGELOG.md; then
            echo "ERROR: Missing CHANGELOG.md section for ${TAG}" >&2
            exit 1
          fi
          echo "Changelog entry found for ${TAG}"

      - name: Build Katib SDK
        working-directory: sdk/python/v1beta1
        run: python -m build

      - name: Build Katib API models
        working-directory: api/python_api
        run: python -m build

      - name: Validate packages
        run: |
          twine check sdk/python/v1beta1/dist/*
          twine check api/python_api/dist/*

      - name: Upload SDK artifacts
        if: needs.prepare.outputs.dry-run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdk-${{ needs.prepare.outputs.version }}
          path: sdk/python/v1beta1/dist/

      - name: Upload API artifacts
        if: needs.prepare.outputs.dry-run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist-api-${{ needs.prepare.outputs.version }}
          path: api/python_api/dist/

      - name: List built packages (dry run)
        if: needs.prepare.outputs.dry-run == 'true'
        run: |
          echo "Built packages (not uploaded in dry run):"
          ls -la sdk/python/v1beta1/dist/
          ls -la api/python_api/dist/

  dry-run-summary:
    name: Dry run summary
    needs: [prepare, build]
    if: needs.prepare.outputs.dry-run == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Katib release dry run passed"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${{ needs.prepare.outputs.version }}\` |"
            echo "| Tag | \`${{ needs.prepare.outputs.tag }}\` |"
            echo "| Release branch | \`${{ needs.prepare.outputs.branch }}\` |"
            echo "| Pre-release | \`${{ needs.prepare.outputs.is-prerelease }}\` |"
            echo
            echo "All pre-flight checks passed. No branches, tags, images, or packages were published."
            echo
            echo "**Next steps:**"
            echo "1. Open (or merge) the release PR if you have not already."
            echo "2. Merge the PR to trigger a real release, **or** re-run this workflow with \`dry_run: false\` on the release branch."
          } >> "$GITHUB_STEP_SUMMARY"

  create-tag:
    name: Create and push tag
    needs: [prepare, build]
    if: needs.prepare.outputs.dry-run != 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Create tag
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists. Skipping"
            exit 0
          fi
          TAG_SHA=$(git rev-parse HEAD)
          git tag "$TAG" "$TAG_SHA"
          git push origin "$TAG"

  publish-images:
    name: Publish release images
    needs: [prepare, create-tag]
    if: needs.prepare.outputs.dry-run != 'true'
    uses: ./.github/workflows/publish-release-images.yaml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [prepare, build, create-tag, publish-images]
    if: needs.prepare.outputs.dry-run != 'true'
    runs-on: ubuntu-22.04
    environment:
      name: release
      url: https://pypi.org/project/kubeflow-katib/
    steps:
      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-sdk-${{ needs.prepare.outputs.version }}
          path: dist-sdk/

      - name: Download API artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-api-${{ needs.prepare.outputs.version }}
          path: dist-api/

      - name: Publish Katib SDK to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-sdk/
          skip-existing: true

      - name: Publish Katib API models to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-api/
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [prepare, build, create-tag, publish-images, publish-pypi]
    if: needs.prepare.outputs.dry-run != 'true'
    runs-on: ubuntu-22.04
    environment:
      name: release
      url: https://github.com/kubeflow/katib/releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-sdk-${{ needs.prepare.outputs.version }}
          path: dist-sdk/

      - name: Download API artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-api-${{ needs.prepare.outputs.version }}
          path: dist-api/

      - name: Extract changelog
        if: needs.prepare.outputs.is-prerelease != 'true'
        id: changelog
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          set -euo pipefail
          [[ -f CHANGELOG.md ]] || { echo "ERROR: CHANGELOG.md not found" >&2; exit 1; }
          HEADER_REGEX="^# \\[${TAG//./\\.}\\]"
          SECTION=$(sed -n "/$HEADER_REGEX/,\$p" CHANGELOG.md)
          [[ -n "$SECTION" ]] || { echo "ERROR: No changelog section for $TAG" >&2; exit 1; }
          NEXT_VERSION=$(echo "$SECTION" | grep -m1 "^# \\[v[0-9]" || true)
          if [[ -n "$NEXT_VERSION" ]]; then
            CHANGELOG=$(echo "$SECTION" | sed '1d' | sed '/^# \[v/,$d')
          else
            CHANGELOG=$(echo "$SECTION" | sed '1d')
          fi
          [[ -n "$CHANGELOG" ]] || { echo "ERROR: Empty changelog body for $TAG" >&2; exit 1; }
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.branch }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is-prerelease == 'true' }}
          generate_release_notes: ${{ needs.prepare.outputs.is-prerelease == 'true' }}
          files: |
            dist-sdk/*
            dist-api/*
